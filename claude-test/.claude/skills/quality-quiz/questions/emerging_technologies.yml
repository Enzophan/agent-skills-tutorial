- id: 4
  topic: Emerging Technologies
  difficulty: medium
  format: single_choice
  question: "What is MLOps?"
  options: ["A machine learning model format","A set of practices to deploy and maintain ML models in production reliably","A database engine","A testing framework"]
  answer: "A set of practices to deploy and maintain ML models in production reliably"
