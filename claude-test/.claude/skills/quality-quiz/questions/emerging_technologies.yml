- id: 1
  topic: Emerging Technologies
  difficulty: easy
  format: single_choice
  question: "What is a large language model (LLM) primarily used for?"
  options: ["Compiling source code","Generating and understanding natural language","Database indexing","Network routing"]
  answer: "Generating and understanding natural language"
  explanation: "LLMs are deep-learning models trained on massive text corpora to generate, summarize, and reason about natural language."

- id: 2
  topic: Emerging Technologies
