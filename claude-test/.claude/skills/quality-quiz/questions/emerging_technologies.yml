  question: "Which of the following are emerging trends in software testing? (Select all that apply)"
  options: ["AI-assisted test generation","Self-healing test automation","Quantum computing","Manual-only testing","Predictive test analytics"]
  answer: ["AI-assisted test generation", "Self-healing test automation", "Predictive test analytics"]
