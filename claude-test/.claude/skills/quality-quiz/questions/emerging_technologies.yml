- id: 5
  topic: Emerging Technologies
  difficulty: hard
  format: multi_select
  question: "Which of the following are common risks when adopting AI in software testing? (Select all that apply)"
  options: ["Hallucinated or inaccurate outputs","Bias in training data","Reduced need for human review","Loss of test coverage visibility","Improved reproducibility"]
  answer: ["Hallucinated or inaccurate outputs", "Bias in training data", "Loss of test coverage visibility"]
  explanation: "AI can hallucinate, reflect training-data bias, and obscure what is actually being tested. Reduced human review and improved reproducibility are typically benefits, not risks."
