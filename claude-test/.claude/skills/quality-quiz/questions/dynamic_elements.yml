- id: 1
  topic: Dynamic Elements
  difficulty: easy
  format: single_choice
  question: "What is a 'dynamic element' on a website?"
  options: ["An element with hard-coded text in HTML", "An element whose attributes (id, class, position) change between page loads or sessions", "A static image that never changes", "An element only available in CSS files"]
  answer: "An element whose attributes (id, class, position) change between page loads or sessions"
  explanation: "Dynamic elements are DOM elements whose locators (often id/class) are regenerated by JavaScript frameworks, making static selectors unreliable."

- id: 2
  topic: Dynamic Elements
  difficulty: easy
  format: true_false
  question: "Stable, well-chosen locators are essential for reliable automated tests on modern web applications."
  answer: true
  explanation: "Flaky tests are most often caused by brittle locators; using stable, user-facing attributes is a core test-automation best practice."

- id: 3
  topic: Dynamic Elements
  difficulty: medium
  format: multi_select
  question: "Which of the following are recommended strategies for locating dynamic elements? (Select all that apply)"
  options: ["Use stable test-ids (e.g., data-testid attributes) added by developers", "Use user-facing attributes like aria-label, role, or visible text", "Use absolute XPath that starts from the document root", "Use CSS attribute selectors that match a stable pattern (e.g., starts-with)", "Use chained locators that scope to a stable parent container"]
  answer: ["Use stable test-ids (e.g., data-testid attributes) added by developers", "Use user-facing attributes like aria-label, role, or visible text", "Use CSS attribute selectors that match a stable pattern (e.g., starts-with)", "Use chained locators that scope to a stable parent container"]
  explanation: "Test-ids, accessibility-based locators, partial-attribute CSS, and parent-scoped chains are robust. Absolute XPath is fragile and breaks with any DOM restructuring."

- id: 4
  topic: Dynamic Elements
  difficulty: medium
  format: single_choice
  question: "In Playwright, which locator API is recommended for dynamic, user-facing elements?"
  options: ["page.locator('xpath=//div[3]/span[2]')", "page.getByRole('button', { name: 'Submit' })", "page.locator('#generated-id-12345')", "page.locator(':nth-match(div, 5)')"]
  answer: "page.getByRole('button', { name: 'Submit' })"
  explanation: "Playwright's getByRole/getByLabel/getByText locators query user-facing semantics and survive UI changes, unlike generated ids or positional XPath."

- id: 5
  topic: Dynamic Elements
  difficulty: hard
  format: multi_select
  question: "Which of the following help deal with elements that appear asynchronously after a network/API call? (Select all that apply)"
  options: ["Auto-waiting locators that retry until the element is actionable", "Waiting for a specific network response with waitForResponse()", "Using expect(locator).toBeVisible() with auto-retry assertions", "Adding a fixed sleep() before the action as the primary wait strategy", "Waiting for a parent container to be visible before querying its children"]
  answer: ["Auto-waiting locators that retry until the element is actionable", "Waiting for a specific network response with waitForResponse()", "Using expect(locator).toBeVisible() with auto-retry assertions", "Waiting for a parent container to be visible before querying its children"]
  explanation: "Auto-waiting, response-based waits, auto-retrying assertions, and scoped visibility checks are robust. Fixed sleeps are an anti-pattern that hides the real synchronization signal."

- id: 6
  topic: Dynamic Elements
  difficulty: medium
  format: true_false
  question: "Shadow DOM elements can always be located with a standard page.locator() call."
  answer: false
  explanation: "Shadow DOM requires piercing the shadow root before locating elements. In Playwright, you use locators with >> shadow-piercing CSS (e.g., 'css=button') or page.locator() that already pierces shadow DOM automatically; in Selenium you must use shadowRoot APIs."
