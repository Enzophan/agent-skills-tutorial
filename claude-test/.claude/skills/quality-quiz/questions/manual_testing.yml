  question: "Which of the following are valid techniques in manual testing? (Select all that apply)"
  options: ["Exploratory testing","Ad-hoc testing","Boundary value analysis","Mutation testing only","Usability testing"]
  answer: ["Exploratory testing", "Ad-hoc testing", "Boundary value analysis", "Usability testing"]
  explanation: "Exploratory, ad-hoc, BVA, and usability testing are common manual techniques. Mutation testing is automated."

