- id: 1
  topic: Software Development Processes
  difficulty: easy
  format: multiple_choice
  question: "Which methodology emphasizes iterative development and customer collaboration?"
  options: ["Waterfall","Agile","Spiral","V-Model"]
  answer: "Agile"
  explanation: "Agile emphasizes iterative cycles, customer feedback, and adaptability over rigid planning."
- id: 2
  topic: Software Development Processes
  difficulty: easy
  format: true_false
  question: "In the Waterfall model, each phase must be completed before the next begins."
  answer: true
  explanation: "Waterfall follows a sequential, phase-gate approach where phases do not overlap."
- id: 3
  topic: Software Development Processes
  difficulty: medium
  format: multiple_choice
  question: "What is a sprint in Scrum?"
  options: ["A daily standup meeting","A time-boxed iteration of work","A retrospective event","A backlog refinement session"]
  answer: "A time-boxed iteration of work"
  explanation: "A sprint is a fixed-length iteration (typically 1-4 weeks) during which a potentially shippable increment is created."
- id: 4
  topic: Software Development Processes
  difficulty: medium
  format: short_answer
  question: "What does SDLC stand for and what are its main phases?"
  answer: "Software Development Life Cycle; main phases are Requirements, Design, Implementation, Testing, Deployment, and Maintenance."
  explanation: "SDLC provides a structured framework for planning and managing software projects."
- id: 5
  topic: Software Development Processes
  difficulty: hard
  format: multiple_choice
  question: "Which process model combines iterative development with risk analysis?"
  options: ["Waterfall","Agile","Spiral","V-Model"]
  answer: "Spiral"
  explanation: "The Spiral model combines prototyping and risk analysis in iterative cycles."
